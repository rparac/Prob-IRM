# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: grid
  # - override /hydra/launcher: joblib # waits for execution of all to complete before starting new processes

hydra:
  sweeper:
    direction: maximize
    study_name: tuning
    storage: null
    n_trials: 5
    n_jobs: 1
    params:
      env.coffee_label_factory.sensor_true_confidence: choice(0.6, 0.7, 0.8, 0.9, 1)

run:
  no_display: True
  name: "task"