# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: grid
  # - override /hydra/launcher: joblib # waits for execution of all to complete before starting new processes

hydra:
  sweeper:
    direction: maximize
    study_name: tuning
    storage: null
    n_trials: 9
    n_jobs: 1
    params:
      run.edge_cost: choice(1, 2, 4)
      run.ex_penalty_multiplier: choice(1, 2, 4)


run:
  no_display: True
  name: "penalty_mults"