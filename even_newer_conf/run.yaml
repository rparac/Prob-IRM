num_workers: 2

ray_init_config:
  num_cpus: None
  local_mode: False
  runtime_env:
    env_vars:
      RAY_DEBUG: 1

training_config:
  entropy_coeff: 0.02
  lr: 2.5e-4
  gamma: 0.99
  vf_loss_coeff: 0.5
  lambda_: 0.95
  clip_param: 0.2
  vf_clip_param: 0.2
  grad_clip: 0.5
  grad_clip_by: "value"
  kl_target: 0.0
  num_sgd_iter: 10
  use_critic: True
  use_gae: True

evaluation:
  evaluation_num_workers: 1
  evaluation_interval: 50  # 10
  evaluation_duration: 1  # 5
  evaluation_duration_unit: "episodes"
  evaluation_sample_timeout_s: 600
  evaluation_parallel_to_training: True
